version: '3.8'
services:
  app:
    build: .
    ports:
      - "3001:3001"
      - "5000:5000"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=change_this_secret_in_production
      - STRIPE_SECRET_KEY=sk_test_mock
      - AFRICASTALKING_API_KEY=mocked_api_key
    volumes:
      - ./server/data/db.json:/app/server/data/db.json
    restart: unless-stopped
